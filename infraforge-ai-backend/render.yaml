# Render Blueprint — connect repo, set secrets in dashboard, then deploy.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: infraforge-api
    runtime: python
    rootDir: infraforge-ai-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: infraforge_ai
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: ENABLE_OPENAI
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_VISION_MODEL
        value: gpt-4o-mini
      - key: OPENAI_WHISPER_MODEL
        value: whisper-1
      - key: USE_OPENAI_VISION
        value: "false"
      - key: USE_OPENAI_INTENT_PARSER
        value: "false"
      - key: AI_INTENT_MODE
        value: llm_first
      - key: USE_LLM_RESPONSE_GENERATION
        value: "true"
      - key: VOICE_PIPELINE_V2
        value: "true"
      - key: CORS_ORIGINS
        value: https://infra-ai-assistant.vercel.app
      - key: WARMUP_EMBEDDING_ON_STARTUP
        value: "false"
      - key: IMAGE_CLASSIFIER
        value: opencv
