# InfraForge AI Assistant — Promptfoo evaluation config
# Generate tests:  python scripts/generate_eval_cases.py
# Run via promptfoo: npx promptfoo eval -c promptfoo/promptfoo.yaml
# Run native:      python scripts/run_assistant_eval.py

description: InfraForge marketplace assistant — 180+ prompt regression suite + semantic understanding phase (207 cases)

prompts:
  - "{{message}}"

providers:
  - id: file://providers/infraforge_chat.py
    label: InfraForge Chatbot (direct)

defaultTest:
  options:
    provider: InfraForge Chatbot (direct)

outputPath: output/promptfoo_results.json

tests: file://tests/assistant_eval.yaml
